spring.application.name=photographer-manager

spring.config.import=optional:file:.env[.properties]

# Honra X-Forwarded-* do proxy (gera https:// nas URLs atras de TLS termination)
server.forward-headers-strategy=framework

# URL base publica usada para montar links de arquivos/recursos.
# Vazio = detecta a partir da requisicao. Em producao defina APP_BASE_URL=https://api-dev-framelio.gomesdev.tech
app.base-url=${APP_BASE_URL:}

# Datasource
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Swagger UI
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=email,profile

# Frontend redirect URI after OAuth2 login (receives ?token=<jwt>)
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/auth/callback}

# Frontend URL (used in password reset links)
app.frontend-url=${FRONTEND_URL:http://localhost:5173}

# E-mail (SMTP) — configure MAIL_HOST no .env para ativar envio de e-mails
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# MercadoPago
mercadopago.access-token=${MERCADO_PAGO_ACCESS_TOKEN}
mercadopago.public-key=${MERCADO_PAGO_PUBLIC_KEY}

# Store config
store.commission-rate=0.06
store.download-expiry-hours=72
store.max-downloads=3
